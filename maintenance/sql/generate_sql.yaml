    collection-agent-role:
      agentRoleOrder:
        value: 1
    event-agent-role:
      agentRoleOrder:
        value: 1
    identification:
      taxonFormula:
        value: '''A'''
    identification-agent-role:
      agentRoleOrder:
        value: 1
    material-agent-role:
      agentRoleOrder:
        value: 1
    media-agent-role:
      agentRoleOrder:
        value: 1
    molecular-protocol-agent-role:
      agentRoleOrder:
        value: 1
    occurrence:
      occurrenceStatus:
        value: '''detected'''
      organismScope:
        value: '''multicellular organism'''
      taxonFormula:
        value: '''A'''
    occurrence-agent-role:
      agentRoleOrder:
        value: 1
    organism-interaction-agent-role:
      agentRoleOrder:
        value: 1
    resource-relationship:
      relationshipOrder:
        value: 1
    survey:
      taxonCompletenessReported:
        value: '''notReported'''
    survey-agent-role:
      agentRoleOrder:
        value: 1
    survey-target-descriptor:
