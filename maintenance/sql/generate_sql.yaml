metadata:
  title: Darwin Core Data Package PostgreSQL schema
  version: '2026-03-19'
  source_table_schemas: table-schemas/
  generated_by: generate_sql.py
  notes:
  - Generated from DwC-DP table schemas plus PostgreSQL sidecar configuration.
  - foreignKeys are rendered as PostgreSQL FOREIGN KEY constraints.
  - weakForeignKeys are rendered as plain columns with indexes but without REFERENCES.
  example_run: |
    python generate_sql.py \
      --schemas ../../dwc-dp/table-schemas \
      --config generate_sql.yaml \
      --output generated_from_schemas.sql
enums:
  degree_of_establishment:
    vocabulary_url: https://raw.githubusercontent.com/tdwg/rs.tdwg.org/refs/heads/master/degreeOfEstablishment/degreeOfEstablishment.csv
  establishment_means:
    vocabulary_url: https://raw.githubusercontent.com/tdwg/rs.tdwg.org/refs/heads/master/establishmentMeans/establishmentMeans.csv
  pathway:
    vocabulary_url: https://raw.githubusercontent.com/tdwg/rs.tdwg.org/refs/heads/master/pathway/pathway.csv
  taxon_completeness_reported:
    vocabulary_url: https://raw.githubusercontent.com/tdwg/rs.tdwg.org/refs/heads/master/taxonCompletenessReported/taxonCompletenessReported.csv

  event_category:
    values:
    - Event
    - MaterialGathering
    - Occurrence
    - OrganismInteraction
    - Survey
  include_or_exclude:
    values:
    - include
    - exclude
  occurrence_status:
    values:
    - detected
    - present
    - notDetected
    - absent
  relationship_targets:
    values:
    - Agent
    - BibliographicResource
    - ChronometricAge
    - Event
    - GeologicalContext
    - Identification
    - Material
    - Media
    - MolecularProtocol
    - NucleotideAnalysis
    - NucleotideSequence
    - Occurrence
    - Organism
    - OrganismInteraction
    - Protocol
    - Provenance
    - Survey
    - SurveyTarget
    - SurveyTargetDescriptor
    - UsagePolicy
