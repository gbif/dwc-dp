        value: '''include'''
checks:
  columns:
    collection-agent-role:
      agentRoleOrder:
      - name: collection_agent_role_order_valid
        sql: agent_role_order >= 1
    event:
      startDayOfYear:
      - name: event_start_day_of_year_valid
        sql: start_day_of_year BETWEEN 1 AND 366
      endDayOfYear:
      - name: event_end_day_of_year_valid
        sql: end_day_of_year BETWEEN 1 AND 366
      coordinateUncertaintyInMeters:
      - name: event_coordinate_uncertainty_in_meters_valid
        sql: coordinate_uncertainty_in_meters > 0 AND coordinate_uncertainty_in_meters
          <= 20037509
      coordinatePrecision:
      - name: event_coordinate_precision_valid
        sql: coordinate_precision >= 0 AND coordinate_precision <= 90
      footprintSpatialFit:
      - name: event_footprint_spatial_fit_valid
        sql: footprint_spatial_fit >= 0
      pointRadiusSpatialFit:
      - name: event_point_radius_spatial_fit_valid
        sql: point_radius_spatial_fit = 0 OR point_radius_spatial_fit >= 1
types:
  columns:
    agent-agent-role:
